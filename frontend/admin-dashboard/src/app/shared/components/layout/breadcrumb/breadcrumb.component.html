<nav class="mm-breadcrumb-nav" aria-label="Breadcrumb">
  <button type="button" class="mm-breadcrumb-home" (click)="homeClick.emit()">
    <ng-icon [name]="homeIcon()" class="size-3.5" />
    <span>{{ homeLabel() }}</span>
  </button>

  @for (item of items(); track $index) {
    <ng-icon [name]="'lucideChevronRight'" class="mm-breadcrumb-separator" aria-hidden="true" />
    @if (item.route && !item.active) {
      <a [routerLink]="item.route" class="mm-breadcrumb-item hover:text-emerald-600 transition-colors">
        {{ item.label }}
      </a>
    } @else {
      <span [class]="item.active ? 'mm-breadcrumb-item mm-breadcrumb-item--active' : 'mm-breadcrumb-item'">
        {{ item.label }}
      </span>
    }
  }
</nav>
