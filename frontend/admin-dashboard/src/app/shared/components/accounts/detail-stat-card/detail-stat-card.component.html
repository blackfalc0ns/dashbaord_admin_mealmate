<div [class]="cardClass()">
  <div class="flex flex-col gap-1">
    <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">{{ label() }}</span>
    <span class="text-xl font-extrabold text-slate-900 sm:text-2xl">{{ value() }}</span>
  </div>
  <div [class]="iconClass({ tone: tone() })">
    <ng-icon [name]="icon()" size="20" />
  </div>
</div>
