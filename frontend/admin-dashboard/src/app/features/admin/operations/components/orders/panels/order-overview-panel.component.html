<div class="flex flex-col gap-4">
  <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
    <div class="rounded-2xl border border-slate-100 bg-white p-4 shadow-sm">
      <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">{{ copy().deliveryDate }}</span>
      <p class="mt-1 text-lg font-extrabold text-slate-900">{{ order.deliveryDate }}</p>
    </div>
    <div class="rounded-2xl border border-slate-100 bg-white p-4 shadow-sm">
      <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">{{ copy().phase }}</span>
      <p class="mt-2"><mm-order-lifecycle-badge [phase]="order.phase" /></p>
    </div>
    <div class="rounded-2xl border border-slate-100 bg-white p-4 shadow-sm">
      <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">{{ copy().sla }}</span>
      <p class="mt-2"><mm-sla-countdown [hoursRemaining]="order.hoursUntilDelivery" /></p>
    </div>
    <div class="rounded-2xl border border-slate-100 bg-white p-4 shadow-sm">
      <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">{{ copy().subscriptionDay }}</span>
      <p class="mt-1 text-lg font-extrabold text-slate-900">{{ subscriptionDayLabel() }}</p>
    </div>
  </div>

  <div class="grid gap-4 lg:grid-cols-3">
    <mm-detail-panel-card
      [title]="copy().panelOrderMeal"
      icon="lucideUtensils"
      iconClass="text-emerald-600"
    >
      <div class="grid gap-3 sm:grid-cols-2">
        <mm-detail-field [label]="copy().orderId" [value]="order.orderId" icon="lucideHash" [mono]="true" />
        <mm-detail-field [label]="copy().meal" [value]="order.mealName" icon="lucideUtensils" />
        <mm-detail-field
          [label]="copy().mealCalories"
          [value]="order.extras.mealCalories + ' ' + copy().kcal"
          icon="lucideActivity"
        />
        <mm-detail-field
          [label]="copy().autoSelected"
          [value]="order.extras.autoSelected ? copy().autoSelectedYes : copy().autoSelectedNo"
          icon="lucideStar"
        />
        <mm-detail-field [label]="copy().allergens" [value]="order.extras.allergens" icon="lucideShieldAlert" />
        <mm-detail-field [label]="copy().dietaryNotes" [value]="order.extras.dietaryNotes" icon="lucideClipboardList" />
      </div>
    </mm-detail-panel-card>

    <mm-detail-panel-card
      [title]="copy().panelCustomerDelivery"
      icon="lucideUser"
      iconClass="text-blue-600"
    >
      <div class="grid gap-3 sm:grid-cols-2">
        <mm-detail-field [label]="copy().customer" [value]="order.customerDisplayName" icon="lucideUser" />
        <mm-detail-field
          [label]="copy().customerPhone"
          [value]="order.extras.customerPhone"
          icon="lucidePhone"
          [mono]="true"
          valueDir="ltr"
        />
        <mm-detail-field [label]="copy().deliveryArea" [value]="order.extras.deliveryArea" icon="lucideMapPin" />
        <mm-detail-field
          [label]="copy().deliveryAddress"
          [value]="order.extras.deliveryAddressMasked"
          icon="lucideMap"
        />
        <mm-detail-field
          [label]="copy().customerEditLocked"
          [value]="order.isCustomerEditLocked ? copy().yes : copy().no"
          icon="lucideLock"
          [tone]="order.isCustomerEditLocked ? 'warning' : 'success'"
        />
        @if (order.extras.lockedAt) {
          <mm-detail-field
            [label]="copy().lockedAt"
            [value]="formatDateTime(order.extras.lockedAt)"
            icon="lucideClock"
          />
        }
      </div>
    </mm-detail-panel-card>

    <mm-detail-panel-card
      [title]="copy().panelSubscription"
      icon="lucideCreditCard"
      iconClass="text-violet-600"
    >
      <div class="grid gap-3 sm:grid-cols-2">
        <mm-detail-field
          [label]="copy().subscriptionId"
          [value]="order.extras.subscriptionId"
          icon="lucideFileText"
          [mono]="true"
        />
        <mm-detail-field [label]="copy().program" [value]="order.programName" icon="lucideBuilding" />
        <mm-detail-field [label]="copy().bundle" [value]="order.bundleName" icon="lucideClipboardList" />
        <mm-detail-field [label]="copy().tier" [value]="order.tierName" icon="lucideStar" />
        <mm-detail-field [label]="copy().restaurant" [value]="order.restaurantName" icon="lucideBuilding" />
        <mm-detail-field [label]="copy().subscriptionDay" [value]="subscriptionDayLabel()" icon="lucideCalendar" />
      </div>
    </mm-detail-panel-card>
  </div>
</div>
