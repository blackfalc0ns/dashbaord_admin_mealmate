<section [attr.dir]="locale.isRtl() ? 'rtl' : 'ltr'" class="mm-page min-h-full text-slate-900">
  <div class="flex w-full flex-col gap-4">
    @if (toast()) {
      <div class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-2 text-sm font-medium text-emerald-800">{{ toast() }}</div>
    }

    <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-5">
      <mm-operations-kpi-card
        [label]="copy().needsAction"
        [description]="copy().needsActionDesc"
        [value]="kpis().needsAction"
        icon="lucideCircleAlert"
        valueClass="text-red-600"
        iconWrapClass="bg-red-50 text-red-600 ring-red-100"
        [active]="activeView() === 'needs-action'"
        (clicked)="setView('needs-action')"
      />
      <mm-operations-kpi-card
        [label]="copy().awaitingConfirm"
        [description]="copy().awaitingConfirmDesc"
        [value]="kpis().confirmation"
        icon="lucideClock"
        valueClass="text-amber-600"
        iconWrapClass="bg-amber-50 text-amber-600 ring-amber-100"
        [active]="activeView() === 'confirmation'"
        (clicked)="setView('confirmation')"
      />
      <mm-operations-kpi-card
        [label]="copy().replacement"
        [description]="copy().replacementDesc"
        [value]="kpis().replacement"
        icon="lucideRefreshCw"
        valueClass="text-violet-600"
        iconWrapClass="bg-violet-50 text-violet-600 ring-violet-100"
        [active]="activeView() === 'replacement'"
        (clicked)="setView('replacement')"
      />
      <mm-operations-kpi-card
        [label]="copy().prep24"
        [description]="copy().prep24Desc"
        [value]="kpis().prep"
        icon="lucidePackage"
        valueClass="text-sky-600"
        iconWrapClass="bg-sky-50 text-sky-600 ring-sky-100"
        [active]="activeView() === 'prep'"
        (clicked)="setView('prep')"
      />
      <mm-operations-kpi-card
        [label]="copy().todayOrders"
        [description]="copy().todayOrdersDesc"
        [value]="kpis().all"
        icon="lucideLayoutDashboard"
        [active]="activeView() === 'all'"
        (clicked)="setView('all')"
      />
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <div class="relative max-w-xs">
        <span class="pointer-events-none absolute inset-y-0 start-0 flex items-center ps-3 text-slate-400">
          <ng-icon name="lucideSearch" size="16" />
        </span>
        <input
          type="text"
          class="w-full rounded-lg border border-slate-200 bg-slate-50 py-2 ps-9 pe-3 text-sm outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100"
          [placeholder]="copy().searchPlaceholder"
          (input)="searchQuery.set($any($event.target).value)"
        />
      </div>
    </div>

    <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
      @if (filteredRows().length === 0) {
        <p class="p-8 text-center text-sm text-slate-500">{{ emptyMessage() }}</p>
      } @else {
        <mm-order-queue-table [rows]="filteredRows()" (actionRequested)="onAction($event)" />
      }
    </div>
  </div>

  <mm-order-action-drawer
    [orderId]="drawerOrderId()"
    [action]="drawerAction()"
    (closed)="closeDrawer()"
    (completed)="onActionCompleted($event)"
  />
</section>
