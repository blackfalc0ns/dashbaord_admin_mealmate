<section [attr.dir]="locale.isRtl() ? 'rtl' : 'ltr'" class="mm-page min-h-full text-slate-900">
  <div class="flex flex-col gap-5">

    <!-- ═══ Modern Segmented Tab Switcher ═══ -->
    <div class="inline-flex self-start rounded-2xl bg-white ring-1 ring-slate-200 p-1 shadow-[0_1px_2px_rgba(15,23,42,0.03)]">
      <button
        type="button"
        class="inline-flex items-center gap-1.5 rounded-xl px-3.5 py-1.5 text-xs font-bold transition-all"
        [ngClass]="activeTab() === 'tracking' ? 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
        (click)="setTab('tracking')"
      >
        {{ copy().trackingTab }}
      </button>
      <button
        type="button"
        class="inline-flex items-center gap-1.5 rounded-xl px-3.5 py-1.5 text-xs font-bold transition-all"
        [ngClass]="activeTab() === 'hold' ? 'bg-rose-50 text-rose-700 ring-1 ring-rose-200 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
        (click)="setTab('hold')"
      >
        <span>{{ copy().holdTab }}</span>
        @if (holdCount() > 0) {
          <span class="inline-flex items-center justify-center rounded-full bg-rose-600 min-w-[16px] h-[16px] px-1 text-[9px] font-bold text-white">{{ holdCount() }}</span>
        }
      </button>
    </div>

    @if (activeTab() === 'tracking') {
      <mm-tracking-panel />
    } @else {
      <mm-hold-panel />
    }
  </div>
</section>
