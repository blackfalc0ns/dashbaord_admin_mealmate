<section [attr.dir]="locale.isRtl() ? 'rtl' : 'ltr'" class="mm-page min-h-full text-slate-900">
  <div class="flex flex-col gap-4">
    <div class="flex gap-2 border-b border-slate-200">
      <button
        type="button"
        class="px-4 py-2 text-sm font-bold transition"
        [ngClass]="activeTab() === 'tracking' ? 'border-b-2 border-emerald-600 text-emerald-700' : 'text-slate-500'"
        (click)="setTab('tracking')"
      >
        {{ copy().trackingTab }}
      </button>
      <button
        type="button"
        class="px-4 py-2 text-sm font-bold transition"
        [ngClass]="activeTab() === 'hold' ? 'border-b-2 border-emerald-600 text-emerald-700' : 'text-slate-500'"
        (click)="setTab('hold')"
      >
        {{ copy().holdTab }}
        @if (holdCount() > 0) {
          <span class="ms-1 rounded-full bg-red-500 px-1.5 py-0.5 text-[10px] text-white">{{ holdCount() }}</span>
        }
      </button>
    </div>

    @if (activeTab() === 'tracking') {
      <mm-tracking-panel />
    } @else {
      <mm-hold-panel />
    }
  </div>
</section>
