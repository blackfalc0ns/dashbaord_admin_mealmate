<mm-detail-panel-card [title]="copy().tabCampaignAudit" icon="lucideActivity" [subtitle]="campaign().auditLog.length + ' events'">
  <ul class="relative space-y-0">
    @for (e of campaign().auditLog; track e.id; let first = $first) {
      <li class="relative flex gap-4 pb-6 ps-8">
        @if (!first) {
          <span class="absolute start-3 top-0 h-full w-px bg-slate-200"></span>
        }
        <span class="absolute start-1.5 top-1 flex size-4 items-center justify-center rounded-full bg-violet-600 ring-4 ring-white">
          <ng-icon name="lucideActivity" size="8" class="text-white" />
        </span>
        <div class="min-w-0 flex-1 rounded-xl border border-slate-100 bg-slate-50/50 p-4">
          <div class="flex flex-wrap items-start justify-between gap-2">
            <p class="font-bold text-slate-900">{{ locale.isRtl() ? e.actionAr : e.actionEn }}</p>
            <time class="shrink-0 text-[10px] text-slate-400">{{ e.atUtc | date: 'medium' }}</time>
          </div>
          <p class="mt-1 text-xs text-slate-500">{{ e.actor }}</p>
          @if (e.detailAr || e.detailEn) {
            <p class="mt-2 rounded-lg bg-white px-3 py-2 text-xs text-slate-600">
              {{ locale.isRtl() ? e.detailAr : e.detailEn }}
            </p>
          }
        </div>
      </li>
    }
  </ul>
</mm-detail-panel-card>
