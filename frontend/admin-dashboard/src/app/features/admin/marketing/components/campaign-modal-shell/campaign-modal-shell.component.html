@if (open()) {
  <div
    class="fixed inset-0 z-[60] flex items-end justify-center bg-black/45 p-4 backdrop-blur-[1px] sm:items-center"
    role="dialog"
    aria-modal="true"
    (click)="close()"
  >
    <div
      class="max-h-[92vh] w-full overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl"
      [class]="maxWidthClass()"
      [attr.dir]="locale().isRtl() ? 'rtl' : 'ltr'"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-start justify-between gap-3 border-b border-slate-100 px-5 py-4">
        <div>
          <h2 class="text-lg font-extrabold text-slate-900">{{ title() }}</h2>
          @if (subtitle(); as sub) {
            <p class="mt-0.5 text-xs text-slate-500">{{ sub }}</p>
          }
        </div>
        <button type="button" class="rounded-lg p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700" (click)="close()">
          <ng-icon name="lucideX" size="20" />
        </button>
      </div>
      <div class="max-h-[calc(92vh-4.5rem)] overflow-y-auto px-5 py-4">
        <ng-content />
      </div>
    </div>
  </div>
}
