<mm-detail-panel-card [title]="copy().tabParticipants" icon="lucideStore" [subtitle]="campaign().participants.length + ' ' + copy().tabParticipants">
  @if (!campaign().participants.length) {
    <p class="py-8 text-center text-sm text-slate-500">{{ copy().noData }}</p>
  } @else {
    <div class="grid gap-3 sm:grid-cols-2">
      @for (p of campaign().participants; track p.id) {
        <button
          type="button"
          class="group flex flex-col gap-2 rounded-xl border border-slate-100 bg-slate-50/40 p-4 text-start transition hover:border-violet-200 hover:bg-violet-50/30 hover:shadow-sm"
          (click)="selectParticipant.emit(p)"
        >
          <div class="flex items-start justify-between gap-2">
            <div class="flex items-center gap-2">
              <div class="flex size-9 items-center justify-center rounded-lg bg-white text-violet-600 shadow-sm">
                <ng-icon name="lucideStore" size="16" />
              </div>
              <div>
                <p class="font-bold text-slate-900 group-hover:text-violet-800">{{ restaurantName(p) }}</p>
                <p class="text-[10px] text-slate-500">{{ locale.isRtl() ? p.bundleLabelAr : p.bundleLabelEn }}</p>
              </div>
            </div>
            <span
              class="shrink-0 rounded-full px-2 py-0.5 text-[10px] font-bold ring-1"
              [class.bg-emerald-50]="p.enrollmentStatus === 'Agreed'"
              [class.text-emerald-700]="p.enrollmentStatus === 'Agreed'"
              [class.ring-emerald-200]="p.enrollmentStatus === 'Agreed'"
              [class.bg-amber-50]="p.enrollmentStatus === 'Pending'"
              [class.text-amber-700]="p.enrollmentStatus === 'Pending'"
            >
              {{ enrollmentLabel(p.enrollmentStatus) }}
            </span>
          </div>
          <dl class="grid grid-cols-3 gap-1 text-center text-[10px]">
            <div class="rounded-lg bg-white p-1.5">
              <dt class="text-slate-400">{{ copy().discountedPrice }}</dt>
              <dd class="font-bold text-emerald-700">{{ p.discountedDailyPrice }}</dd>
            </div>
            <div class="rounded-lg bg-white p-1.5">
              <dt class="text-slate-400">{{ copy().netPrice }}</dt>
              <dd class="font-bold text-violet-700">{{ p.netDailyPrice }}</dd>
            </div>
            <div class="rounded-lg bg-white p-1.5">
              <dt class="text-slate-400">{{ copy().dailyCapacity }}</dt>
              <dd class="font-bold">{{ p.campaignDailyCapacity + p.additionalCapacity }}</dd>
            </div>
          </dl>
          <span class="inline-flex items-center gap-1 text-[10px] font-bold text-violet-700 opacity-0 transition group-hover:opacity-100">
            {{ copy().modalViewDetails }}
            <ng-icon name="lucideChevronLeft" size="12" [class.rotate-180]="!locale.isRtl()" />
          </span>
        </button>
      }
    </div>
  }
</mm-detail-panel-card>
