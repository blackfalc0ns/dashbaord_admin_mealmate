<mm-shell-card class="mm-admin-toolbar-card mm-overview-command-bar">
  <div class="mm-overview-command-bar__hero">
    <mm-breadcrumb
      [homeLabel]="panelLabel()"
      [items]="breadcrumbItems()"
      (homeClick)="goHome()"
    />

    <mm-page-heading [title]="pageTitle()" [description]="pageDescription()">
      <a
        page-heading-action
        class="mm-page-heading__action mm-overview-command-bar__action"
        [routerLink]="'/admin/operations/72h-rule/exceptions'"
      >
        <span class="mm-overview-command-bar__action-icon" aria-hidden="true">+</span>
        <span>{{ quickActionLabel() }}</span>
      </a>
    </mm-page-heading>
  </div>

  <div class="mm-overview-command-bar__controls">
    <div class="mm-overview-command-bar__meta">
      <span class="mm-overview-command-bar__row-label">
        {{ locale.isRtl() ? 'نطاق البيانات' : 'Data scope' }}
      </span>
      <div class="mm-overview-command-bar__meta-chips">
        @if (countryLabel()) {
          <span class="mm-overview-command-bar__chip mm-overview-command-bar__chip--country">
            <span class="mm-overview-command-bar__chip-mark" aria-hidden="true"></span>
            {{ countryLabel() }}
          </span>
        }
        @if (updatedAt()) {
          <span class="mm-overview-command-bar__chip mm-overview-command-bar__chip--muted">
            {{ updatedAt() }}
          </span>
        }
      </div>
    </div>

    <div class="mm-overview-command-bar__period">
      <span class="mm-overview-command-bar__row-label">
        {{ locale.isRtl() ? 'الفترة' : 'Period' }}
      </span>
      <mm-overview-period-filter
        [embedded]="true"
        [selected]="selected()"
        (periodChange)="periodChange.emit($event)"
      />
    </div>
  </div>

  <div class="mt-3 flex w-full flex-col gap-1.5 border-t border-slate-200/70 pt-3">
    <span
      class="px-0.5 text-[0.625rem] font-extrabold uppercase tracking-wide text-slate-400 leading-tight"
    >
      {{ locale.isRtl() ? 'أقسام اللوحة' : 'Dashboard sections' }}
    </span>
    <div class="relative min-w-0 w-full">
      <mm-overview-section-nav
        [embedded]="true"
        [activeId]="activeTab()"
        [badges]="tabBadges()"
        (tabChange)="tabChange.emit($event)"
      />
    </div>
  </div>
</mm-shell-card>
