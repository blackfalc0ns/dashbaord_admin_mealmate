<section [attr.dir]="locale.isRtl() ? 'rtl' : 'ltr'" class="mm-page min-h-full text-slate-900">
  <div class="flex w-full flex-col gap-4">
    @if (toast()) {
      <div class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-2 text-sm font-medium text-emerald-800">
        {{ toast() }}
      </div>
    }

    <div class="grid gap-3 sm:grid-cols-3">
      <div class="rounded-xl border border-red-200 bg-red-50 p-4 shadow-sm sm:col-span-2">
        <div class="flex items-start gap-3">
          <div class="flex size-10 shrink-0 items-center justify-center rounded-lg bg-red-100 text-red-600">
            <ng-icon name="lucideCircleAlert" size="20" />
          </div>
          <div>
            <h2 class="text-sm font-extrabold text-red-900">{{ copy().overdueKpi }}</h2>
            <p class="mt-1 text-xs text-red-700">{{ copy().overdueDesc }}</p>
          </div>
        </div>
      </div>
      <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <span class="text-xs font-bold text-slate-500">{{ copy().overdue }}</span>
        <p class="text-3xl font-extrabold text-red-600">{{ rows().length }}</p>
      </div>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <div class="relative max-w-xs">
        <span class="pointer-events-none absolute inset-y-0 start-0 flex items-center ps-3 text-slate-400">
          <ng-icon name="lucideSearch" size="16" />
        </span>
        <input
          type="text"
          class="w-full rounded-lg border border-slate-200 bg-slate-50 py-2 ps-9 pe-3 text-sm outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100"
          [placeholder]="copy().searchPlaceholder"
          (input)="searchQuery.set($any($event.target).value)"
        />
      </div>
    </div>

    <div class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
      @if (rows().length === 0) {
        <p class="p-8 text-center text-sm text-slate-500">{{ copy().noOrders }}</p>
      } @else {
        <mm-order-72h-table
          [rows]="rows()"
          mode="overdue"
          [onOpenReplacement]="openReplacement"
          [onManualReassign]="manualReassign"
        />
      }
    </div>
  </div>
</section>
