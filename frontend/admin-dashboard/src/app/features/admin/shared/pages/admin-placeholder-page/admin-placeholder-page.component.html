<section class="mm-page">
  <div
    class="rounded-2xl border border-dashed border-emerald-200 bg-emerald-50/40 px-6 py-10 text-center"
  >
    <span
      class="mx-auto mb-4 inline-flex rounded-full border border-emerald-200 bg-white px-3 py-1 text-xs font-bold text-emerald-700"
    >
      {{ comingSoonLabel() }}
    </span>
    <h2 class="text-lg font-extrabold text-slate-900">{{ pageTitle() }}</h2>
    @if (pageDescription()) {
      <p class="mx-auto mt-2 max-w-xl text-sm leading-relaxed text-slate-500">
        {{ pageDescription() }}
      </p>
    }
    <p class="mx-auto mt-4 max-w-md text-xs text-slate-400">{{ hintLabel() }}</p>
  </div>
</section>
